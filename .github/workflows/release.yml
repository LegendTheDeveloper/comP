name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            daemon/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript (production)
        run: npm run vscode:prepublish

      - name: Build Rust daemon (release)
        run: npm run daemon:build

      - name: Install vsce (VSCode Extension CLI)
        run: npm install -g vsce

      - name: Package VSIX
        run: vsce package --out comP-${{ github.ref_name }}.vsix

      - name: Verify SBOM
        run: |
          # Check if SBOM.json exists
          if [ ! -f SBOM.json ]; then
            echo "Warning: SBOM.json not found, using pre-generated SBOM"
          else
            echo "SBOM.json found, verifying format..."
            jq . SBOM.json > /dev/null && echo "SBOM.json is valid JSON"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            comP-${{ github.ref_name }}.vsix
            SBOM.json
          body: |
            ## Release ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Files

            - **comP-${{ github.ref_name }}.vsix** — VSCode extension package
            - **SBOM.json** — Software Bill of Materials (CycloneDX 1.4 format)
            - **Daemon binary** — Included in VSIX package

            ### Installation

            #### VSCode Extension
            ```bash
            code --install-extension comP-${{ github.ref_name }}.vsix
            ```

            Or drag-and-drop the VSIX file onto VSCode.

            ### What's in this release

            - ✅ Rust daemon with 5 MCP tools (run_pipeline, get_context, get_impact_graph, list_indexed_files, get_token_usage)
            - ✅ GraphDB (SQLite) for code indexing
            - ✅ TF-IDF semantic search engine
            - ✅ Dependency analysis (BFS graph traversal)
            - ✅ Token counting and cost estimation
            - ✅ JSON-RPC 2.0 protocol over stdio
            - ✅ 66+ unit tests, 4 integration tests

            ### Security

            See `SBOM.json` for software dependencies and licenses.

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
