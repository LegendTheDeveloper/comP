name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-daemon:
    name: Build Daemon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            daemon/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust daemon
        run: cargo build --release
        working-directory: daemon

      - name: Prepare binary for packaging (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist-bin
          cp daemon/target/release/comp-daemon dist-bin/comp-daemon-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'macos' }}

      - name: Prepare binary for packaging (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-bin
          Copy-Item daemon/target/release/comp-daemon.exe dist-bin/comp-daemon-win.exe

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.os }}
          path: dist-bin/

  package:
    name: Package Extension
    needs: build-daemon
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Download all daemon artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: daemon-*
          path: daemon-artifacts

      - name: Place binaries in package structure
        run: |
          mkdir -p daemon/target/release
          cp daemon-artifacts/daemon-ubuntu-latest/comp-daemon-linux daemon/target/release/
          cp daemon-artifacts/daemon-macos-latest/comp-daemon-macos daemon/target/release/
          cp daemon-artifacts/daemon-windows-latest/comp-daemon-win.exe daemon/target/release/
          chmod +x daemon/target/release/comp-daemon-linux daemon/target/release/comp-daemon-macos

      - name: Build TypeScript (production)
        run: npm run vscode:prepublish

      - name: Install vsce (VSCode Extension CLI)
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: vsce package --out comP-${{ github.ref_name }}.vsix

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            comP-${{ github.ref_name }}.vsix
            sbom.cdx.json
            docs/compliance/vex.cdx.json
          body: |
            ## Release ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Files

            - **comP-${{ github.ref_name }}.vsix** — VSCode extension package (includes multi-platform daemon binaries)
            - **sbom.cdx.json** — Software Bill of Materials (CycloneDX 1.6)
            - **vex.cdx.json** — Vulnerability Exploitability eXchange

            ### Installation

            ```bash
            code --install-extension comP-${{ github.ref_name }}.vsix
            ```

            Or drag-and-drop the VSIX file onto VSCode.

            ### Security

            See [SECURITY.md](https://github.com/tsucky230/comP/blob/main/SECURITY.md)
            for vulnerability reporting and [docs/compliance/](https://github.com/tsucky230/comP/blob/main/docs/compliance/README.md)
            for CRA compliance information.

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        # secretsはif条件式で直接参照できないため、本家リポジトリの実行時のみ公開するように制御します
        if: github.repository == 'tsucky230/comP'
        run: vsce publish -i comP-${{ github.ref_name }}.vsix --pat ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: github.repository == 'tsucky230/comP'
        run: npx ovsx publish comP-${{ github.ref_name }}.vsix -p ${{ secrets.OVSX_PAT }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
