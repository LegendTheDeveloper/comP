name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            daemon/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript (production)
        run: npm run vscode:prepublish

      - name: Build Rust daemon (release)
        run: npm run daemon:build

      - name: Install vsce (VSCode Extension CLI)
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: vsce package --out comP-${{ github.ref_name }}.vsix

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            comP-${{ github.ref_name }}.vsix
            sbom.cdx.json
            docs/compliance/vex.cdx.json
          body: |
            ## Release ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Files

            - **comP-${{ github.ref_name }}.vsix** — VSCode extension package
            - **sbom.cdx.json** — Software Bill of Materials (CycloneDX 1.6)
            - **vex.cdx.json** — Vulnerability Exploitability eXchange
            - **Daemon binary** — Included in VSIX package

            ### Installation

            ```bash
            code --install-extension comP-${{ github.ref_name }}.vsix
            ```

            Or drag-and-drop the VSIX file onto VSCode.

            ### Security

            See [SECURITY.md](https://github.com/tsucky230/comP/blob/main/SECURITY.md)
            for vulnerability reporting and [docs/compliance/](https://github.com/tsucky230/comP/blob/main/docs/compliance/README.md)
            for CRA compliance information.

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
