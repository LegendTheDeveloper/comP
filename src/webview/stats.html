<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>comP Statistics Dashboard</title>
    <link rel="stylesheet" href="stats.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>comP Statistics</h1>
            <p class="subtitle">Code Context Engine Dashboard</p>
        </header>

        <main>
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon files">📁</div>
                    <div class="stat-content">
                        <h3>Files Indexed</h3>
                        <div class="stat-value" id="totalFiles">0</div>
                        <p class="stat-unit">source files</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon symbols">🔤</div>
                    <div class="stat-content">
                        <h3>Symbols Found</h3>
                        <div class="stat-value" id="totalNodes">0</div>
                        <p class="stat-unit">functions, classes, types</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon edges">🔗</div>
                    <div class="stat-content">
                        <h3>Dependencies</h3>
                        <div class="stat-value" id="totalEdges">0</div>
                        <p class="stat-unit">relationships</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon size">💾</div>
                    <div class="stat-content">
                        <h3>Database Size</h3>
                        <div class="stat-value" id="indexSize">--</div>
                        <p class="stat-unit">on disk</p>
                    </div>
                </div>
            </div>

            <!-- Languages Section -->
            <section class="section">
                <h2>Languages</h2>
                <div class="languages-list" id="languagesList">
                    <p class="loading">Loading language breakdown...</p>
                </div>
            </section>

            <!-- Last Indexed -->
            <section class="section">
                <h2>Status</h2>
                <div class="status-info">
                    <div class="status-item">
                        <span class="status-label">Last Indexed:</span>
                        <span class="status-value" id="lastIndexed">Never</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Status:</span>
                        <span class="status-badge ready" id="indexStatus">Ready</span>
                    </div>
                </div>
            </section>

            <!-- Actions -->
            <section class="section actions">
                <button id="refreshBtn" class="btn btn-primary">Refresh Stats</button>
                <button id="forceIndexBtn" class="btn btn-secondary">Force Re-index</button>
            </section>
        </main>
    </div>

    <script src="stats.js"></script>
</body>
</html>
