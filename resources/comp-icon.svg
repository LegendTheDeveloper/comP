<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!--
    VS Code activity bar icon: transparent background, single-color star.
    VS Code applies theme color to all opaque pixels automatically.
    Star: center(64,64), outer R=52, inner r=20, standard 5-point proportions.
    Marketplace PNG (comp-icon.png) is generated separately with white bg.
  -->
  <polygon
    points="64,12 76,48 113,48 83,70 95,106 64,84 33,106 45,70 15,48 52,48"
    fill="#000000"/>
</svg>
